# 저장 위치: .github/workflows/fetch_bnb.yml
# 역할: 매시간 자동으로 새 BNB 캔들을 받아 bnb_history.csv에 이어붙인다.

name: Fetch BNB Data

on:
  schedule:
    - cron: "40 * * * *"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas

      - name: 데이터 수집 실행
        run: python bnb/binance_bnb_fetch.py

      - name: 결과 자동 커밋
        run: |
          git config user.name "bnb-bot"
          git config user.email "actions@github.com"
          git add bnb/bnb_history.csv
          git diff --cached --quiet || git commit -m "chore: BNB 데이터 자동 업데이트"
          git push
