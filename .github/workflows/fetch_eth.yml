# 저장 위치: .github/workflows/fetch_eth.yml
# 역할: 매시간 자동으로 새 ETH 캔들을 받아 eth_history.csv에 이어붙인다.

name: Fetch ETH Data

on:
  schedule:
    - cron: "35 * * * *"   # 매시간 35분에 실행 (BTC 수집과 겹치지 않도록 시간 분산)
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas

      - name: 데이터 수집 실행
        run: python binance_eth_fetch.py

      - name: 결과 자동 커밋
        run: |
          git config user.name "eth-bot"
          git config user.email "actions@github.com"
          git add eth_history.csv
          git diff --cached --quiet || git commit -m "chore: ETH 데이터 자동 업데이트"
          git push
