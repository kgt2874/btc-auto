name: Fetch BTC Data

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas

      - name: 데이터 수집 실행
        run: python binance_btc_fetch.py

      - name: 결과 자동 커밋
        run: |
          git config user.name "btc-bot"
          git config user.email "actions@github.com"
          git add btc_history.csv
          git diff --cached --quiet || git commit -m "chore: BTC 데이터 자동 업데이트"
          git push
